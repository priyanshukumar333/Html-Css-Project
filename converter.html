<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            padding: 100px;
        }
        .h1{
            text-align: center;
        }
        #container{
            text-align: center;
            background-color: bisque;
            padding: 50px;
        }
        .input-div{
            text-align: center;
        }
        .inp{
            padding: 5px;
            margin: 10px;
            font-size: 30px;
             font-weight: bold;
             width: 250px;
             text-align: center;
        }
        label{
            font-size: 22px;
            color: blueviolet;
        }
    </style>
     <title>temperature converter</title>
</head>
<body>
    <h1 class="h1"> temperature converter</h1>
    <div id="container">
        <input type="number" value="0" id="cel" class="inp"><br>
        <label>celcius</label>
     
     <div class="input-div">
        <input type="number" value="32" id="fah" class="inp"><br>
        <label>ferenahit</label>
     </div>
     </div>
     <script>
        let cel=document.getElementById("cel");
        let fah=document.getElementById("fah");
        cel.addEventListener('input',function()
        {
            let c=this.value;
            let f=(c* 9/5)+32;
            if(!Number.isInteger(f)){
                f=f.toFixed(4);
            }
            fah.value=f;
        })
        fah.addEventListener('input',function(){
            let f=this.value;
            let c=(f- 32)*9/5;
            if(!Number.isInteger(c)){
                c=c.toFixed(4);
            }
        cel.value=c;

        })
     </script>
</body>
</html>
